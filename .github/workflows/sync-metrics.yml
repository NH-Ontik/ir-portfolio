name: Sync Project Metrics

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  repository_dispatch:
    types: [repo-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo data and build project-data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS=(
            "NH-Ontik/international-relations-knowledge-base-by-nh-ontik"
            "NH-Ontik/ir-history-atlas"
            "NH-Ontik/ukraine-war"
            "NH-Ontik/cuban-missile-crisis"
          )
          LABELS=(
            "IR Knowledge Base"
            "IR History Atlas"
            "The Ukraine War"
            "Cuban Missile Crisis"
          )
          ZONE_KEYS=(
            "knowledge-base"
            "history-atlas"
            "ukraine-war"
            "cuban-missile"
          )
          STATIC_NOTES=233
          STATIC_WORDS="62k"
          STATIC_EVENTS_1=173
          STATIC_EVENTS_2=20
          STATIC_DAYS=13

          # Date range for Cloudflare (last 7 days)
          DATE_UNTIL=$(date -u +%Y-%m-%d)
          DATE_SINCE=$(date -u -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)

          # Start JSON
          echo '{ "projects": {}, "activity": [], "totals": {}, "fetchedAt": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'" }' > project-data.json

          # Fetch each repo
          for i in "${!REPOS[@]}"; do
            FULL="${REPOS[$i]}"
            LABEL="${LABELS[$i]}"
            OWNER="${FULL%/*}"
            REPO="${FULL#*/}"

            echo "Fetching $FULL..."

            # Repo metadata
            META=$(gh api "repos/$FULL" --jq '{
              stars: .stargazers_count,
              forks: .forks_count,
              openIssues: .open_issues_count,
              defaultBranch: .default_branch,
              pushedAt: .pushed_at,
              description: .description
            }' 2>/dev/null || echo '{}')

            # Recent commits (top 5)
            COMMITS=$(gh api "repos/$FULL/commits?per_page=5" --jq '[.[] | {
              message: .commit.message,
              date: .commit.author.date,
              sha: .sha[0:7],
              author: .commit.author.name
            }]' 2>/dev/null || echo '[]')

            # Extract latest commit (null if empty)
            LATEST=$(echo "$COMMITS" | jq '.[0] // null' 2>/dev/null || echo 'null')

            # Commit count (number of recent commits fetched)
            COMMIT_COUNT=$(echo "$COMMITS" | jq 'length' 2>/dev/null || echo "0")

            # Build project entry
            ENTRY=$(jq -n \
              --argjson meta "$META" \
              --argjson commits "$COMMITS" \
              --argjson latest "$LATEST" \
              --argjson commitCount "${COMMIT_COUNT:-0}" \
              --arg label "$LABEL" \
              '{
                label: $label,
                meta: $meta,
                latestCommit: $latest,
                commitCount: $commitCount,
                recentCommits: $commits
              }')

            # Determine key based on repo name
            case "$REPO" in
              international-relations-knowledge-base-by-nh-ontik) KEY="knowledge-base" ;;
              ir-history-atlas) KEY="history-atlas" ;;
              ukraine-war) KEY="ukraine-war" ;;
              cuban-missile-crisis) KEY="cuban-missile" ;;
            esac

            # Add to JSON
            jq --arg key "$KEY" --argjson entry "$ENTRY" '.projects[$key] = $entry' project-data.json > tmp.json && mv tmp.json project-data.json

            # Collect activity
            echo "$COMMITS" | jq -c --arg repo "$LABEL" '.[] | {repo: $repo, message: .message, date: .date, sha: .sha}' >> /tmp/activity.jsonl
          done

          # Merge activity (deduplicate by sha), sort by date, take top 10
          if [ -f /tmp/activity.jsonl ]; then
            jq -s 'sort_by(.date) | reverse | unique_by(.sha) | .[:10]' /tmp/activity.jsonl > /tmp/activity_sorted.json
            jq --slurpfile activity /tmp/activity_sorted.json '.activity = $activity[0]' project-data.json > tmp.json && mv tmp.json project-data.json
          fi

          # Set totals
          jq --arg events "$((STATIC_EVENTS_1 + STATIC_EVENTS_2))" \
             --arg notes "$STATIC_NOTES" \
             --arg words "$STATIC_WORDS" \
             '.totals = {events: ($events | tonumber), notes: ($notes | tonumber), words: $words}' \
             project-data.json > tmp.json && mv tmp.json project-data.json

          echo "Generated project-data.json (pre-analytics):"
          jq '.' project-data.json

      - name: Fetch Cloudflare analytics
        if: env.CFLARE_API_TOKEN != ''
        env:
          CFLARE_API_TOKEN: ${{ secrets.CFLARE_API_TOKEN }}
        run: |
          ZONE_KEYS=("knowledge-base" "history-atlas" "ukraine-war" "cuban-missile")
          ZONE_IDS=(
            "${{ secrets.CFLARE_ZONE_KB }}"
            "${{ secrets.CFLARE_ZONE_ATLAS }}"
            "${{ secrets.CFLARE_ZONE_UKRAINE }}"
            "${{ secrets.CFLARE_ZONE_CUBA }}"
          )
          DATE_UNTIL=$(date -u +%Y-%m-%d)
          DATE_SINCE=$(date -u -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)

          for i in "${!ZONE_KEYS[@]}"; do
            KEY="${ZONE_KEYS[$i]}"
            ZONE_ID="${ZONE_IDS[$i]}"

            if [ -z "$ZONE_ID" ]; then
              echo "No zone ID for $KEY, skipping"
              continue
            fi

            echo "Fetching Cloudflare analytics for $KEY (zone: $ZONE_ID)..."

            # GraphQL query: summary stats + top pages
            QUERY=$(cat <<EOF
          {
            viewer {
              zones(filter: {zoneTag: "$ZONE_ID"}) {
                httpRequests1dGroups(
                  limit: 1,
                  filter: {date_geq: "$DATE_SINCE", date_leq: "$DATE_UNTIL"}
                ) {
                  sum {
                    requests
                    pageViews
                    bytes
                  }
                }
                httpRequests1d(
                  limit: 5,
                  filter: {date_geq: "$DATE_SINCE", date_leq: "$DATE_UNTIL"},
                  orderBy: [requests_DESC]
                ) {
                  dimensions {
                    clientRequestURI
                  }
                  sum {
                    requests
                  }
                }
              }
            }
          }
          EOF
          )

          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$QUERY" '{"query": $q}')")

          # Check for API errors
          API_ERRORS=$(echo "$RESPONSE" | jq -r '.errors // empty')
          if [ -n "$API_ERRORS" ]; then
            echo "Cloudflare API errors for $KEY: $API_ERRORS"
            continue
          fi

          # Parse summary (handle missing data gracefully)
          REQUESTS=$(echo "$RESPONSE" | jq -r '.data.viewer.zones[0].httpRequests1dGroups[0].sum.requests // 0' 2>/dev/null || echo "0")
          # Note: unique visitors not available in httpRequests1dGroups GraphQL API
          VISITORS=0
          PAGEVIEWS=$(echo "$RESPONSE" | jq -r '.data.viewer.zones[0].httpRequests1dGroups[0].sum.pageViews // 0' 2>/dev/null || echo "0")
          BYTES=$(echo "$RESPONSE" | jq -r '.data.viewer.zones[0].httpRequests1dGroups[0].sum.bytes // 0' 2>/dev/null || echo "0")

          # Format bandwidth
          if [ "$BYTES" -gt 1073741824 ] 2>/dev/null; then
            BANDWIDTH="$(echo "scale=1; $BYTES/1073741824" | bc)GB"
          elif [ "$BYTES" -gt 1048576 ] 2>/dev/null; then
            BANDWIDTH="$(echo "scale=1; $BYTES/1048576" | bc)MB"
          elif [ "$BYTES" -gt 1024 ] 2>/dev/null; then
            BANDWIDTH="$(echo "scale=1; $BYTES/1024" | bc)KB"
          else
            BANDWIDTH="${BYTES}B"
          fi

          # Parse top pages (handle missing/empty data)
          TOP_PAGES=$(echo "$RESPONSE" | jq '[.data.viewer.zones[0].httpRequests1d[]? | {
            path: .dimensions.clientRequestURI,
            count: (.sum.requests | tonumber)
          }] | sort_by(-.count) | .[:5]' 2>/dev/null || echo '[]')

          # Build analytics object
          ANALYTICS=$(jq -n \
            --argjson requests "${REQUESTS:-0}" \
            --argjson visitors "${VISITORS:-0}" \
            --argjson pageviews "${PAGEVIEWS:-0}" \
            --arg bandwidth "$BANDWIDTH" \
            --argjson topPages "$TOP_PAGES" \
            '{
              uniqueVisitors: $visitors,
              totalRequests: $requests,
              pageViews: $pageviews,
              bandwidth: $bandwidth,
              topPages: $topPages
            }')

          # Add analytics to project
          jq --arg key "$KEY" --argjson analytics "$ANALYTICS" \
            '.projects[$key].analytics = $analytics' \
            project-data.json > tmp.json && mv tmp.json project-data.json

          echo "  Requests: $REQUESTS, Visitors: $VISITORS, Pages: $PAGEVIEWS, BW: $BANDWIDTH"
          done

          echo "Generated project-data.json (with analytics):"
          jq '.' project-data.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync project metrics [skip ci]"
            git push
          fi
