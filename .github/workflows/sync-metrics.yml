name: Sync Project Metrics

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  repository_dispatch:
    types: [repo-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo data and build project-data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS=(
            "NH-Ontik/international-relations-knowledge-base-by-nh-ontik"
            "NH-Ontik/ir-history-atlas"
            "NH-Ontik/ukraine-war"
            "NH-Ontik/cuban-missile-crisis"
          )
          LABELS=(
            "IR Knowledge Base"
            "IR History Atlas"
            "The Ukraine War"
            "Cuban Missile Crisis"
          )
          ZONE_KEYS=(
            "knowledge-base"
            "history-atlas"
            "ukraine-war"
            "cuban-missile"
          )
          STATIC_NOTES=233
          STATIC_WORDS="62k"
          STATIC_EVENTS_1=173
          STATIC_EVENTS_2=20
          STATIC_DAYS=13

          # Date range for Cloudflare (last 7 days)
          DATE_UNTIL=$(date -u +%Y-%m-%d)
          DATE_SINCE=$(date -u -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)

          # Start JSON
          echo '{ "projects": {}, "activity": [], "totals": {}, "fetchedAt": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'" }' > project-data.json

          # Fetch each repo
          for i in "${!REPOS[@]}"; do
            FULL="${REPOS[$i]}"
            LABEL="${LABELS[$i]}"
            OWNER="${FULL%/*}"
            REPO="${FULL#*/}"

            echo "Fetching $FULL..."

            # Repo metadata
            META=$(gh api "repos/$FULL" --jq '{
              stars: .stargazers_count,
              forks: .forks_count,
              openIssues: .open_issues_count,
              defaultBranch: .default_branch,
              pushedAt: .pushed_at,
              description: .description
            }' 2>/dev/null || echo '{}')

            # Recent commits (top 5)
            COMMITS=$(gh api "repos/$FULL/commits?per_page=5" --jq '[.[] | {
              message: .commit.message,
              date: .commit.author.date,
              sha: .sha[0:7],
              author: .commit.author.name
            }]' 2>/dev/null || echo '[]')

            # Extract latest commit (null if empty)
            LATEST=$(echo "$COMMITS" | jq '.[0] // null' 2>/dev/null || echo 'null')

            # Commit count (number of recent commits fetched)
            COMMIT_COUNT=$(echo "$COMMITS" | jq 'length' 2>/dev/null || echo "0")

            # Build project entry
            ENTRY=$(jq -n \
              --argjson meta "$META" \
              --argjson commits "$COMMITS" \
              --argjson latest "$LATEST" \
              --argjson commitCount "${COMMIT_COUNT:-0}" \
              --arg label "$LABEL" \
              '{
                label: $label,
                meta: $meta,
                latestCommit: $latest,
                commitCount: $commitCount,
                recentCommits: $commits
              }')

            # Determine key based on repo name
            case "$REPO" in
              international-relations-knowledge-base-by-nh-ontik) KEY="knowledge-base" ;;
              ir-history-atlas) KEY="history-atlas" ;;
              ukraine-war) KEY="ukraine-war" ;;
              cuban-missile-crisis) KEY="cuban-missile" ;;
            esac

            # Add to JSON
            jq --arg key "$KEY" --argjson entry "$ENTRY" '.projects[$key] = $entry' project-data.json > tmp.json && mv tmp.json project-data.json

            # Collect activity
            echo "$COMMITS" | jq -c --arg repo "$LABEL" '.[] | {repo: $repo, message: .message, date: .date, sha: .sha}' >> /tmp/activity.jsonl
          done

          # Merge activity (deduplicate by sha), sort by date, take top 10
          if [ -f /tmp/activity.jsonl ]; then
            jq -s 'sort_by(.date) | reverse | unique_by(.sha) | .[:10]' /tmp/activity.jsonl > /tmp/activity_sorted.json
            jq --slurpfile activity /tmp/activity_sorted.json '.activity = $activity[0]' project-data.json > tmp.json && mv tmp.json project-data.json
          fi

          # Set totals
          jq --arg events "$((STATIC_EVENTS_1 + STATIC_EVENTS_2))" \
             --arg notes "$STATIC_NOTES" \
             --arg words "$STATIC_WORDS" \
             '.totals = {events: ($events | tonumber), notes: ($notes | tonumber), words: $words}' \
             project-data.json > tmp.json && mv tmp.json project-data.json

          echo "Generated project-data.json (pre-analytics):"
          jq '.' project-data.json

      - name: Fetch GitHub traffic analytics
        env:
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || github.token }}
        run: |
          # GitHub Traffic API — views, unique visitors, popular paths
          # NOTE: default GITHUB_TOKEN can only access THIS repo's traffic.
          # For cross-repo traffic, set GH_TRAFFIC_TOKEN as a PAT with repo scope.
          REPOS=("NH-Ontik/international-relations-knowledge-base-by-nh-ontik" "NH-Ontik/ir-history-atlas" "NH-Ontik/ukraine-war" "NH-Ontik/cuban-missile-crisis")
          REPO_KEYS=("knowledge-base" "history-atlas" "ukraine-war" "cuban-missile")

          HAS_TRAFFIC_TOKEN=true
          for i in "${!REPOS[@]}"; do
            REPO="${REPOS[$i]}"
            KEY="${REPO_KEYS[$i]}"

            echo "Fetching GitHub traffic for $KEY ($REPO)..."

            # Fetch views (last 14 days — GitHub API limit)
            VIEWS_RESP=$(curl -s -H "Authorization: token $GH_TRAFFIC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/traffic/views?per_day=true")

            # Check for errors
            ERROR_MSG=$(echo "$VIEWS_RESP" | jq -r '.message // empty' 2>/dev/null)
            if [ -n "$ERROR_MSG" ]; then
              echo "  Error: $ERROR_MSG (need PAT with repo scope for cross-repo traffic)"
              HAS_TRAFFIC_TOKEN=false
              break
            fi

            # Fetch popular paths
            PAGES_RESP=$(curl -s -H "Authorization: token $GH_TRAFFIC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/traffic/popular/paths")

            # Parse views
            TOTAL_VIEWS=$(echo "$VIEWS_RESP" | jq -r '.count // 0' 2>/dev/null || echo "0")
            UNIQUE_VISITORS=$(echo "$VIEWS_RESP" | jq -r '.uniques // 0' 2>/dev/null || echo "0")

            # Parse top pages (limit to 3)
            TOP_PAGES=$(echo "$PAGES_RESP" | jq '[.[] | {path: .path, title: .title, count: .count}] | .[:3]' 2>/dev/null || echo "[]")

            echo "  Views: $TOTAL_VIEWS, Unique visitors: $UNIQUE_VISITORS"

            # Build analytics object
            ANALYTICS=$(jq -n \
              --argjson visitors "${UNIQUE_VISITORS:-0}" \
              --argjson views "${TOTAL_VIEWS:-0}" \
              --argjson pages "$TOP_PAGES" \
              '{
                uniqueVisitors: $visitors,
                pageViews: $views,
                topPages: $pages
              }')

            # Add analytics to project
            jq --arg key "$KEY" --argjson analytics "$ANALYTICS" \
              '.projects[$key].analytics = $analytics' \
              project-data.json > tmp.json && mv tmp.json project-data.json
          done

          if [ "$HAS_TRAFFIC_TOKEN" = false ]; then
            echo ""
            echo "=== Traffic data unavailable ==="
            echo "To enable traffic analytics, create a Personal Access Token (classic)"
            echo "with 'repo' scope and add it as GH_TRAFFIC_TOKEN secret."
            echo "The default GITHUB_TOKEN cannot access other repos' traffic data."
            echo ""
          fi

          echo "Generated project-data.json (with analytics):"
          jq '.' project-data.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync project metrics [skip ci]"
            git push
          fi
